services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: mlops-prometheus
    command:
      - sh
      - -c
      - |
        sed "s|__PRODUCTION_BACKEND_TARGET__|${PRODUCTION_BACKEND_TARGET}|g" /etc/prometheus/prometheus.yml.template > /etc/prometheus/prometheus.yml
        exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --web.enable-lifecycle
    environment:
      PRODUCTION_BACKEND_TARGET: ${PRODUCTION_BACKEND_TARGET}
    volumes:
      - ./prometheus/prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: mlops-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data: