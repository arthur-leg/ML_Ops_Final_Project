name: Deploy to staging

# Deploy to staging
# Runs on every push to staging, per the required "dev -> staging" pipeline:
# full test suite, then train the candidate model and register it in MLflow
# (stage=Staging). No real deployment step: the project runs locally, so
# there is no staging URL to push to, smoke-test, or run E2E tests against.
on:
  push:
    branches:
      - staging

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -m unit -v

      - name: Run integration tests
        run: pytest -m integration -v

  train-candidate:
    name: Train Candidate Model
    runs-on: ubuntu-latest
    needs: test
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[gdrive]"
          pip install --upgrade pyOpenSSL

      - name: Configure DVC remote credentials
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
        run: |
          dvc remote modify --local storage gdrive_client_id "$GDRIVE_CLIENT_ID"
          dvc remote modify --local storage gdrive_client_secret "$GDRIVE_CLIENT_SECRET"

          mkdir -p ~/.cache/pydrive2fs/$GDRIVE_CLIENT_ID
          echo "$GDRIVE_CREDENTIALS_JSON" > ~/.cache/pydrive2fs/$GDRIVE_CLIENT_ID/default.json

      - name: Pull data from DVC remote
        run: dvc pull

      - name: Train candidate model (registers in MLflow, stage=Staging)
        run: python train.py --data data/processed/training_table.csv
