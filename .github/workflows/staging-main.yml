name: Deploy to production

# Runs on every push to main, per the required "staging -> main" pipeline:
# requires passing model promotion gates before considering the model
# production-ready. No real deployment step: the project runs locally,
# so there is no Render/staging URL to push to or smoke-test.
on:
  push:
    branches:
      - main

jobs:
  promotion-gate:
    name: Model Promotion Gate
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[gdrive]"
          pip install --upgrade pyOpenSSL

      - name: Configure DVC remote credentials
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
        run: |
          dvc remote modify --local storage gdrive_client_id "$GDRIVE_CLIENT_ID"
          dvc remote modify --local storage gdrive_client_secret "$GDRIVE_CLIENT_SECRET"

          mkdir -p ~/.cache/pydrive2fs/$GDRIVE_CLIENT_ID
          echo "$GDRIVE_CREDENTIALS_JSON" > ~/.cache/pydrive2fs/$GDRIVE_CLIENT_ID/default.json

      - name: Pull latest data from DVC remote
        run: dvc pull

      # Required quality gate: if promote.py exits non-zero (candidate
      # doesn't beat production), the workflow fails here.
      - name: Run model promotion gate (Staging -> Production)
        run: python promote.py --data data/processed/training_table.csv
