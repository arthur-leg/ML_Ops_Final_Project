name: Deploy to production

# Deploy to production
# Runs on every push to main, per the required "staging -> main" pipeline:
# requires passing model promotion gates, then deploys the code/models
# previously validated on staging to production.
on:
  push:
    branches:
      - main

jobs:
  promotion-gate:
    name: Model Promotion Gate
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[gdrive]"
          pip install --upgrade pyOpenSSL

      - name: Configure DVC remote credentials
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
        run: |
          dvc remote modify --local storage gdrive_client_id "$GDRIVE_CLIENT_ID"
          dvc remote modify --local storage gdrive_client_secret "$GDRIVE_CLIENT_SECRET"

          mkdir -p ~/.cache/pydrive2fs/$GDRIVE_CLIENT_ID
          echo "$GDRIVE_CREDENTIALS_JSON" > ~/.cache/pydrive2fs/$GDRIVE_CLIENT_ID/default.json

      - name: Pull latest data from DVC remote
        run: dvc pull

      # Required quality gate: if promote.py exits non-zero (candidate
      # doesn't beat production), the workflow stops here and production
      # is never touched.
      - name: Run model promotion gate (Staging -> Production)
        run: python promote.py --data data/processed/training_table.csv

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: promotion-gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy backend to production
        env:
          RENDER_PRODUCTION_DEPLOY_HOOK: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}
        run: curl -X POST "$RENDER_PRODUCTION_DEPLOY_HOOK"

      - name: Wait for deployment to be ready
        run: sleep 45

      - name: Smoke test production health endpoint
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: curl --fail "$PRODUCTION_URL/health"

      - name: Verify production serves the Production-stage model
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          response=$(curl -s "$PRODUCTION_URL/health")
          echo "$response"
          echo "$response" | grep -q '"model_loaded":true' || (echo "Production model not loaded!" && exit 1)
