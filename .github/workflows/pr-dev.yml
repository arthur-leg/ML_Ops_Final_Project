name: PR to dev

# Runs on every pull request targeting the dev branch, per the required
# "PR -> dev" pipeline: unit tests, integration tests, Docker build (no push).
on:
  pull_request:
    branches:
      - dev

jobs:
  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -m unit -v

      - name: Run integration tests
        run: pytest -m integration -v

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mlops-final-project:pr-${{ github.event.pull_request.number }}
