services:
  app-db:
    image: postgres:16-alpine
    container_name: mlops-app-db
    environment:
      POSTGRES_DB: ${APP_DB_NAME:-mlops_app}
      POSTGRES_USER: ${APP_DB_USER:-mlops}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-mlops-secret}
    volumes:
      - app_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: .
    container_name: mlops-backend
    depends_on:
      - app-db
    environment:
      APP_DATABASE_URL: postgresql://${APP_DB_USER:-mlops}:${APP_DB_PASSWORD:-mlops-secret}@app-db:5432/${APP_DB_NAME:-mlops_app}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME:-hpi-forecast}
      MLFLOW_MODEL_STAGE: ${MLFLOW_MODEL_STAGE:-Production}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  app_db_data: